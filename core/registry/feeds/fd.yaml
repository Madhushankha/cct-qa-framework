id: fd
label: Flight Disruption
gap_doc: data/gap-docs/fd/FD_UAT_Miro_Gap_Analysis.html
dataset: ../cct-qa-1/doc/source/FD_ALL239_CRT_v15.html
columns:
  pnr: Locator
  pnr_id: PNR ID
  passenger: Passenger
  route: Route
  ticket: Ticket
  status: Status
  system_code: SysCode
  amount: Amount
  currency: Cur
  flags: Flags
  third_party:
  - Scenario
  - Type
  - Claimant
  - Third-party
  - TP
persona:
  default: 'You are a CUSTOMER filing an Air Canada flight-disruption compensation claim.

    Booking: {first} {last}; PNR {pnr}. Disruption: {disruption}. You want compensation.

    If the bot asks for your country of residence or where you are travelling from/based,
    answer {country}.

    Your itinerary, when the bot asks for any of it: flight {carrier}{flight} from {origin} to
    {destination} on {flight_date}. Give these exact values — never invent a flight number, route or
    date, and never say you do not have them to hand.

    If the assistant reaches a clear determination — eligible OR not eligible — and explains
    the reason, ACCEPT it politely and end the conversation. Do NOT argue, dispute, or ask for
    a manual/agent review. Your goal is to receive the determination, not to contest it.

    '
  branches:
    third_party: 'You are an ADULT filing ON BEHALF OF another passenger {first} {last}
      ({minor_or_pax}).

      If asked whether you are the passenger, choose "filing on behalf of someone
      else".

      '
judge:
  verdict_enum:
  - ELIGIBLE
  - NOT_ELIGIBLE
  - NO_DETERMINATION
  - PENDING
  - ESCALATED
  - UNKNOWN
  # The chat judge compares only what the customer actually sees: the verdict and the amount. The
  # systemCode (FD-ASL-NE-01 etc.) is an INTERNAL DDS code the bot never speaks, so judging the
  # transcript for it always reports "none provided" and falsely fails correct conversations. The
  # systemCode IS still verified — against the DDS determination via the dds_endpoint_systemcode_match
  # checkpoint, where it belongs.
  match_on:
  - status
  - amount
checkpoints:
  auditor: fd
  areas:
  - trip_active
  - trip_details
  - passenger
  - dob
  - ticket
  - eds_pnr_output
  - eds_contact_email
  - group_context
  - dds_endpoint_systemcode_match
  - dds_amount_match
  - ne_nd_reason_text
  - ac_wallet_loyalty
  - passenger_count
  - pending_flight_le_72h
  - name_uniqueness
test_case_doc: ../cct-qa-1/CCT_Agent_New 3/CCT_Agent_New/scenarios/fd-sit/FD_SIT_PNR_MAPPING.md
