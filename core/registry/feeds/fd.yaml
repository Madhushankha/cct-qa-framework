# feeds/fd.yaml — Flight Disruption feed descriptor (ILLUSTRATIVE STUB)
# One file per feed. The generic engine reads this; adding a feed adds no engine code.
id: fd
label: Flight Disruption

# source of truth — parsed by catalog (P1)
gap_doc: data/gap-docs/fd/FD_UAT_Miro_Gap_Analysis.html

# how the catalog maps this domain's datagrid columns → SeedSpec
columns:
  locator: Locator
  pnr_id: "PNR ID"
  passenger: Passenger
  route: Route
  ticket: Ticket
  status: Status
  system_code: SysCode
  amount: Amount
  currency: Cur
  flags: Flags
  # domain extras
  third_party: [Scenario, Type, Claimant, Third-party, TP]   # any of these → third-party branch

# customer persona the runner (P3) uses; {slots} filled from the use-case
persona:
  default: |
    You are a CUSTOMER filing an Air Canada flight-disruption (APPR compensation) claim...
    Booking: {first} {last}; PNR {locator}. Disruption: {disruption}. You want compensation.
  branches:
    third_party: |
      You are an ADULT filing ON BEHALF OF another passenger {first} {last} ({minor_or_pax})...
      If asked whether you are the passenger, choose "filing on behalf of someone else".

# judge (P3) — verdict + tool schema for this feed
judge:
  verdict_enum: [ELIGIBLE, NOT_ELIGIBLE, NO_DETERMINATION, PENDING, ESCALATED, UNKNOWN]
  match_on: [status, system_code, amount]   # systemCode-match, amount-aware

# checkpoint auditor (P2) — areas verified before running (from the gap-doc spine)
checkpoints:
  auditor: fd
  areas:
    - trip_active
    - trip_details
    - passenger
    - dob
    - ticket
    - eds_pnr_output
    - eds_contact_email      # the OTP gate — {email,phone} injected here
    - group_context
    - dds_endpoint_systemcode_match
    - dds_amount_match
    - ne_nd_reason_text
    - ac_wallet_loyalty
    - passenger_count
    - pending_flight_le_72h
    - name_uniqueness
