# SeatChange seed manifest — SCAFFOLD, not yet wired into seed/cli.py's run_seed_all (which still
# hardcodes feed="fd": base_dir, the DDS template-family gate, the checkpoints auditor lookup, and
# the compensationEligibility-only canonicalizer). See
# docs/superpowers/plans/2026-07-17-nc-seatchange-seed.md.
#
# SeatChange is an UPDATE feed (message_kind: create+update), NOT a pure CREATE like fd/soc/anc/
# bookingchange — the base body below is an eligible-booking CREATE (pnr + ticket, no FDM, no DDS)
# that establishes the parent trip_details row a seating-change UPDATE needs to FK to (a bare UPDATE
# on a fresh locator has no parent row and produces NO Aurora write — see seed/feeds/prelude.py's
# module docstring). The full per-case seed path is TWO Kafka bursts, not one:
#
#   1. render this base (pnr+ticket, seating.seats[0].number=14C) with the case's real target seat —
#      same text-replace render.py already does for fd/soc/anc/bookingchange (would need a small
#      renderer extension to also rewrite the seating block, not just the PNR/ticket identity fields);
#   2. seed/feeds/prelude.build_create_payload(payload, revert_fields) on that rendered body, using
#      base/meta.json's prelude.revert_fields, to synthesize a CREATE with seating.seats[0].number
#      reverted back to 14C — publish this FIRST;
#   3. seed/feeds/prelude.wait_for(source, "trip_details", pnr_id) until the parent row lands (see
#      the base meta's prelude.wait_for note: AuroraSource has no dedicated trip_details probe today,
#      so this proxies through trip() — an open item, not resolved by this manifest);
#   4. publish the real seating-change UPDATE (the case's to-seat, bookingSource, window=NON_VOID,
#      and the eligible flag).
#
# CAVEAT: seed/render.py's render_case only copies 01_pnr.json / 02_ticket*.json / *.xml and does the
# identity/name/route/flight/delay text-replace — it does NOT yet build the two-burst CREATE-prelude
# sequence above, nor rewrite the seating block. Until that lands this manifest is scaffolding,
# matching anc's manifest.yaml status; the offline-testable prelude mechanism lives in
# seed/feeds/prelude.py and the offline-testable outcome reader in seed/feeds/seatchange_outcome.py.
feed: seatchange
base_dir: data/seed-templates/seatchange/base
identity:
  $locator:  "{{ $scenario_pnr }}"
  $date:     "{{ $scenario_date }}"
  $pnrId:    "{{ $locator }}-{{ $date }}"
